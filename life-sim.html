<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Sim · SOME RANDOM GAME</title>
<style>
  :root {
    --bg: #06120a;
    --panel: #0d1f14;
    --accent: #5fe08a;
    --text: #e8f4ec;
    --muted: #7f9c8a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(1000px 600px at 50% -10%, rgba(95,224,138,0.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    height: 100%;
  }
  #wrap { position: relative; width: 100%; height: 100%; }
  canvas { display: block; width: 100%; height: 100%; }

  .hud {
    position: absolute; top: 14px; left: 14px;
    background: rgba(13,31,20,0.82);
    border: 1px solid rgba(95,224,138,0.25);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(6px);
    min-width: 200px;
  }
  .hud h2 {
    margin: 0 0 10px; font-size: 15px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
  }
  .stat { display: flex; justify-content: space-between; font-size: 13px; margin: 4px 0; color: var(--muted); }
  .stat b { color: var(--text); font-variant-numeric: tabular-nums; }

  .graph { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(95,224,138,0.2); }
  .graph-title { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .graph-title span { color: var(--text); font-weight: 700; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .bar-name { font-size: 11px; color: var(--muted); width: 62px; flex: none; }
  .bar-track { flex: 1; height: 12px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0%; border-radius: 6px; transition: width .25s ease; }
  #bar-plants   { background: #1f6b33; }
  #bar-cells    { background: #5fe08a; }
  #bar-chompers { background: hsl(50, 95%, 52%); }
  #bar-swarmers { background: #3a9bff; }

  .controls {
    position: absolute; bottom: 14px; left: 14px; right: 14px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: rgba(13,31,20,0.82);
    border: 1px solid rgba(95,224,138,0.25);
    border-radius: 14px;
    padding: 12px 14px;
    backdrop-filter: blur(6px);
  }
  .controls button {
    background: var(--accent); color: #06120a;
    border: none; border-radius: 9px; padding: 8px 14px;
    font-weight: 800; font-size: 13px; cursor: pointer;
    transition: transform .1s ease, filter .1s ease;
  }
  .controls button:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .controls button.ghost { background: transparent; color: var(--accent); border: 1px solid rgba(95,224,138,0.4); }
  .controls label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .controls input[type=range] { accent-color: var(--accent); width: 110px; }
  .controls .spacer { flex: 1; }

  a.back {
    position: absolute; top: 14px; right: 14px;
    text-decoration: none; color: var(--muted); font-size: 13px;
    background: rgba(13,31,20,0.82);
    border: 1px solid rgba(95,224,138,0.25);
    border-radius: 999px; padding: 8px 16px;
  }
  a.back:hover { color: var(--text); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div class="hud">
    <h2>🌍 Life Sim</h2>
    <div class="stat"><span>Cells</span><b id="s-cells">0</b></div>
    <div class="stat"><span>Plants</span><b id="s-plants">0</b></div>
    <div class="stat"><span>🟨 Chompers</span><b id="s-chompers">0</b></div>
    <div class="stat"><span>🔺 Swarmers</span><b id="s-swarmers">0</b></div>
    <div class="stat"><span>Births</span><b id="s-births">0</b></div>
    <div class="stat"><span>Deaths</span><b id="s-deaths">0</b></div>
    <div class="stat"><span>Cells eaten</span><b id="s-eaten">0</b></div>
    <div class="stat"><span>Chompers slain</span><b id="s-chompkills">0</b></div>

    <div class="graph">
      <div class="graph-title">Population · <span id="dominant">—</span> leads</div>
      <div class="bar-row"><span class="bar-name">Plants</span><div class="bar-track"><div class="bar-fill" id="bar-plants"></div></div></div>
      <div class="bar-row"><span class="bar-name">Cells</span><div class="bar-track"><div class="bar-fill" id="bar-cells"></div></div></div>
      <div class="bar-row"><span class="bar-name">Chompers</span><div class="bar-track"><div class="bar-fill" id="bar-chompers"></div></div></div>
      <div class="bar-row"><span class="bar-name">Swarmers</span><div class="bar-track"><div class="bar-fill" id="bar-swarmers"></div></div></div>
    </div>

    <div id="paused-stats" style="display:none; margin-top:10px; padding-top:10px; border-top:1px solid rgba(95,224,138,0.2);">
      <div class="stat" style="color:var(--accent); letter-spacing:1px;"><span>⏸ PAUSED · avg</span><b></b></div>
      <div class="stat"><span>Hunger</span><b id="s-hunger">0%</b></div>
      <div class="stat"><span>Sight</span><b id="s-sight">0</b></div>
      <div class="stat"><span>Speed</span><b id="s-speed">0</b></div>
      <div class="stat"><span>Max hunger</span><b id="s-maxh">0</b></div>
      <div class="stat" style="color:#3fbf63; letter-spacing:1px; margin-top:6px;"><span>🌱 plants · avg</span><b></b></div>
      <div class="stat"><span>Radius</span><b id="s-pr">0</b></div>
      <div class="stat"><span>Strength</span><b id="s-ps">0</b></div>
      <div class="stat"><span>Growth time</span><b id="s-pg">0s</b></div>
      <div class="stat"><span>Seed chance</span><b id="s-psc">0%</b></div>
    </div>
  </div>

  <a class="back" href="index.html">← Back</a>

  <div class="controls">
    <button id="btn-cell">+ Cell</button>
    <button id="btn-plant">+ Plants</button>
    <button id="btn-chomper">+ Chomper</button>
    <button id="btn-swarmer">+ Swarm</button>
    <button id="btn-pause" class="ghost">⏸ Pause</button>
    <button id="btn-reset" class="ghost">↻ Reset</button>
    <div class="spacer"></div>
    <label>Speed
      <input id="sim-speed" type="range" min="1" max="40" value="10">
    </label>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// the world is a big fixed map; the camera zooms it to fit the screen
const WORLD_W = 2600, WORLD_H = 1800;
let W = WORLD_W, H = WORLD_H;          // sim bounds = world size
let view = { scale: 1, offX: 0, offY: 0, dpr: 1 };

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth, sh = window.innerHeight;
  canvas.width = sw * dpr;
  canvas.height = sh * dpr;
  // fit the whole world on screen, centered
  const scale = Math.min(sw / WORLD_W, sh / WORLD_H);
  view = { scale, dpr, offX: (sw - WORLD_W * scale) / 2, offY: (sh - WORLD_H * scale) / 2, sw, sh };
}
window.addEventListener('resize', resize);
resize();

// convert a screen (mouse) point into world coordinates
function toWorld(px, py) {
  return { x: (px - view.offX) / view.scale, y: (py - view.offY) / view.scale };
}

// ---- helpers ----
const rand = (a, b) => a + Math.random() * (b - a);
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx*dx + dy*dy; };

// personal space: push overlapping creatures apart so they don't stack.
// Uses a spatial grid so it stays fast even with hundreds of entities.
function separate(list, radiusOf) {
  const CELL = 48;
  const grid = new Map();
  for (const e of list) {
    const k = Math.floor(e.x / CELL) * 100000 + Math.floor(e.y / CELL);
    let arr = grid.get(k);
    if (!arr) { arr = []; grid.set(k, arr); }
    arr.push(e);
  }
  for (const e of list) {
    const gx = Math.floor(e.x / CELL), gy = Math.floor(e.y / CELL);
    const re = radiusOf(e);
    for (let ox = -1; ox <= 1; ox++) for (let oy = -1; oy <= 1; oy++) {
      const arr = grid.get((gx + ox) * 100000 + (gy + oy));
      if (!arr) continue;
      for (const o of arr) {
        if (o === e) continue;
        const dx = e.x - o.x, dy = e.y - o.y;
        const min = re + radiusOf(o);
        const d2 = dx * dx + dy * dy;
        if (d2 < min * min && d2 > 0.0001) {
          const d = Math.sqrt(d2);
          const push = (min - d) * 0.5;     // each visit moves only e; pair visited both ways
          e.x = Math.min(W, Math.max(0, e.x + (dx / d) * push));
          e.y = Math.min(H, Math.max(0, e.y + (dy / d) * push));
        }
      }
    }
  }
}

// ---- Plant: food, drawn as two dark-green ovals. Grows from a seed,
//      and once mature drops a new seed nearby every 4-5 seconds. ----
const SEC = 60;                 // ~frames per second at speed x1
// mutate a stat: 25% chance to drift ±10%, otherwise unchanged
const mut = v => Math.random() < 0.25 ? v * rand(0.9, 1.1) : v;

class Plant {
  constructor(x, y, grown = true, stats = null) {
    this.x = x; this.y = y;
    this.dead = false;
    this.growth = grown ? 1 : 0;            // 0 = fresh seed, 1 = full plant
    if (stats) {
      // inherit parent's stats, each with a 25% chance of slight mutation
      this.radius = Math.max(0.5, mut(stats.radius));
      this.strength = Math.max(30, mut(stats.strength));      // how far it throws seeds
      this.growthTime = Math.max(3, mut(stats.growthTime));   // seconds to mature
      this.seedChance = Math.min(1, Math.max(0.1, mut(stats.seedChance)));
    } else {
      // a fresh founder plant
      this.radius = rand(0.85, 1.15);
      this.strength = rand(90, 170);
      this.growthTime = rand(6, 10);
      this.seedChance = rand(0.7, 1.0);
    }
    this.reproTimer = rand(4, 5) * SEC;     // countdown to next seed attempt
  }
  get mature() { return this.growth >= 1; }
  get drawR() { return 5 * this.radius; }

  update(sim) {
    if (this.growth < 1) {
      // a seed grows into a full plant over its growthTime
      this.growth = Math.min(1, this.growth + sim.dt / (this.growthTime * SEC));
      return null;
    }
    this.reproTimer -= sim.dt;
    if (this.reproTimer <= 0) {
      this.reproTimer = rand(4, 5) * SEC;
      if (Math.random() > this.seedChance) return null;   // seed chance: may skip
      const ang = rand(0, Math.PI * 2), d = rand(this.strength * 0.5, this.strength);
      const sx = Math.min(W, Math.max(0, this.x + Math.cos(ang) * d));
      const sy = Math.min(H, Math.max(0, this.y + Math.sin(ang) * d));
      const stats = { radius: this.radius, strength: this.strength, growthTime: this.growthTime, seedChance: this.seedChance };
      return new Plant(sx, sy, false, stats);      // drop a seed that inherits stats
    }
    return null;
  }

  draw() {
    const rr = this.radius;
    if (!this.mature) {
      // a growing seed: orange circle that swells as it matures
      ctx.fillStyle = '#ff8c2b';
      ctx.beginPath();
      ctx.arc(this.x, this.y, (2 + this.growth * 3) * rr, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    // full plant: two dark-green ovals (sized by its radius gene)
    ctx.fillStyle = '#1f6b33';
    ctx.beginPath();
    ctx.ellipse(this.x - 4 * rr, this.y, 5 * rr, 8 * rr, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(this.x + 4 * rr, this.y, 5 * rr, 8 * rr, 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- Cell: green circle that eats, moves, splits ----
class Cell {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.maxHunger = opts.maxHunger ?? rand(80, 120);   // max fullness capacity
    // fullness: 100% = totally full, 0% = starved to death
    this.fullness = opts.fullness ?? this.maxHunger * 0.6;
    this.sight = opts.sight ?? rand(180, 360);           // how far it can see food
    this.speed = opts.speed ?? rand(0.8, 1.8);           // movement speed
    this.reproAge = opts.reproAge ?? rand(7, 12) * SEC;  // age needed to duplicate
    this.age = 0;
    this.dir = rand(0, Math.PI * 2);
    this.dead = false;
    this.splitFlash = 0;
  }

  get pct() { return this.fullness / this.maxHunger; }   // 0..1

  get radius() { return 5 + this.pct * 5; }

  update(plants, swarmers, sim) {
    this.age += sim.dt;
    // burn energy over time (bigger sight/speed costs more)
    const metabolism = 0.025 + this.speed * 0.007 + this.sight * 0.00008;
    this.fullness -= metabolism * sim.dt;
    if (this.fullness <= 0) { this.dead = true; return; }

    // only bother hunting when hungry (below 60% full)
    let target = null, tr = 0;
    if (this.pct < 0.6) {
      // seek the nearest food in sight — a full-grown plant OR a swarmer
      let best = this.sight * this.sight;
      for (const p of plants) {
        if (p.dead || !p.mature) continue;      // only full-grown plants are food
        const d2 = dist2(this.x, this.y, p.x, p.y);
        if (d2 < best) { best = d2; target = p; tr = p.drawR; }
      }
      for (const s of swarmers) {
        if (s.dead) continue;                   // cells snack on swarmers too
        const d2 = dist2(this.x, this.y, s.x, s.y);
        if (d2 < best) { best = d2; target = s; tr = s.size; }
      }
    }

    if (target) {
      this.dir = Math.atan2(target.y - this.y, target.x - this.x);
      // eat if touching — restores 40% of max hunger
      if (dist2(this.x, this.y, target.x, target.y) < (this.radius + tr + 3) ** 2) {
        this.fullness = Math.min(this.maxHunger, this.fullness + this.maxHunger * 0.4);
        target.dead = true;
      }
    } else {
      // wander
      this.dir += rand(-0.3, 0.3);
    }

    this.x += Math.cos(this.dir) * this.speed * sim.dt;
    this.y += Math.sin(this.dir) * this.speed * sim.dt;

    // bounce off edges
    if (this.x < 0) { this.x = 0; this.dir = Math.PI - this.dir; }
    if (this.x > W) { this.x = W; this.dir = Math.PI - this.dir; }
    if (this.y < 0) { this.y = 0; this.dir = -this.dir; }
    if (this.y > H) { this.y = H; this.dir = -this.dir; }

    if (this.splitFlash > 0) this.splitFlash -= sim.dt;

    // reproduce by age: survive long enough (and not be starving) -> duplicate
    if (this.age >= this.reproAge && this.pct > 0.4) {
      this.age = 0;                 // begin the next cycle
      this.fullness *= 0.5;         // duplicating costs energy, shared with the child
      this.splitFlash = 12;
      // 25% chance the child mutates to slightly different stats
      const m = () => Math.random() < 0.25 ? rand(0.9, 1.1) : 1;
      const child = new Cell(this.x + rand(-6, 6), this.y + rand(-6, 6), {
        maxHunger: this.maxHunger * m(),
        fullness: this.fullness,
        sight: Math.max(40, this.sight * m()),
        speed: Math.max(0.4, this.speed * m()),
        reproAge: Math.max(3 * SEC, this.reproAge * m()),
      });
      child.splitFlash = 12;
      sim.births++;
      return child;
    }
    return null;
  }

  draw() {
    const r = this.radius;
    // hunger ring (fades from green -> red as it starves)
    const hue = 90 + this.pct * 40;        // ~red(low) to green(high)
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${hue}, 70%, ${this.splitFlash > 0 ? 75 : 55}%)`;
    ctx.fill();
    ctx.strokeStyle = `hsla(${hue}, 80%, 80%, 0.5)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // tiny fullness arc on top
    ctx.beginPath();
    ctx.arc(this.x, this.y, r + 3, -Math.PI/2, -Math.PI/2 + this.pct * Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ---- Chomper: big yellow square predator. Acts like a cell, but it
//      hunts and eats cells instead of plants, and is a bit slower. ----
class Chomper {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.maxHunger = opts.maxHunger ?? rand(140, 200);
    this.fullness = opts.fullness ?? this.maxHunger * 0.6;
    this.sight = opts.sight ?? rand(200, 380);
    this.speed = opts.speed ?? rand(0.6, 1.3);   // slow, lumbering predator
    this.reproAge = opts.reproAge ?? rand(14, 20) * SEC;  // slow to reproduce
    this.age = 0;
    this.dir = rand(0, Math.PI * 2);
    this.dead = false;
    this.splitFlash = 0;
    this.maxHp = 5;
    this.hp = 5;            // swarmers chip this down; eating a cell heals 1
  }

  get pct() { return this.fullness / this.maxHunger; }
  get size() { return 14 + this.pct * 10; }       // square side length

  update(cells, sim) {
    this.age += sim.dt;
    // predators burn energy a little slower so they don't all starve at once
    const metabolism = 0.02 + this.speed * 0.006 + this.sight * 0.00006;
    this.fullness -= metabolism * sim.dt;
    if (this.fullness <= 0) { this.dead = true; return; }

    // hunt the nearest living cell within sight
    let target = null;
    let best = this.sight * this.sight;
    for (const c of cells) {
      if (c.dead) continue;
      const d2 = dist2(this.x, this.y, c.x, c.y);
      if (d2 < best) { best = d2; target = c; }
    }

    if (target) {
      this.dir = Math.atan2(target.y - this.y, target.x - this.x);
      const reach = this.size / 2 + target.radius + 2;
      if (dist2(this.x, this.y, target.x, target.y) < reach * reach) {
        // chomp! a cell gives only a little, so it takes several to breed
        this.fullness = Math.min(this.maxHunger, this.fullness + this.maxHunger * 0.22);
        this.hp = Math.min(this.maxHp, this.hp + 1);   // feeding heals
        target.dead = true;
        sim.eaten++;
      }
    } else {
      this.dir += rand(-0.3, 0.3);
    }

    this.x += Math.cos(this.dir) * this.speed * sim.dt;
    this.y += Math.sin(this.dir) * this.speed * sim.dt;

    if (this.x < 0) { this.x = 0; this.dir = Math.PI - this.dir; }
    if (this.x > W) { this.x = W; this.dir = Math.PI - this.dir; }
    if (this.y < 0) { this.y = 0; this.dir = -this.dir; }
    if (this.y > H) { this.y = H; this.dir = -this.dir; }

    if (this.splitFlash > 0) this.splitFlash -= sim.dt;

    // reproduce by age — slowly, and only if well fed enough to afford it
    if (this.age >= this.reproAge && this.pct > 0.5) {
      this.age = 0;
      this.fullness *= 0.5;
      this.splitFlash = 12;
      const m = () => Math.random() < 0.25 ? rand(0.9, 1.1) : 1;
      const child = new Chomper(this.x + rand(-8, 8), this.y + rand(-8, 8), {
        maxHunger: this.maxHunger * m(),
        fullness: this.fullness,
        sight: Math.max(60, this.sight * m()),
        speed: Math.max(0.4, this.speed * m()),
        reproAge: Math.max(6 * SEC, this.reproAge * m()),
      });
      child.splitFlash = 12;
      sim.chompBirths++;
      return child;
    }
    return null;
  }

  draw() {
    const s = this.size, h = s / 2;
    const light = this.splitFlash > 0 ? 75 : 52;
    ctx.fillStyle = `hsl(50, 95%, ${light}%)`;      // yellow square
    ctx.strokeStyle = `hsla(48, 100%, 80%, ${0.3 + this.pct * 0.5})`;
    ctx.lineWidth = 2;
    ctx.fillRect(this.x - h, this.y - h, s, s);
    ctx.strokeRect(this.x - h, this.y - h, s, s);
    // little dark "teeth" line so it reads as a chomper
    ctx.fillStyle = 'rgba(40,30,0,0.65)';
    ctx.fillRect(this.x - h + 2, this.y - 1.5, s - 4, 3);
    // hp bar above (red when hurt)
    if (this.hp < this.maxHp) {
      const bw = s, by = this.y - h - 5;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(this.x - h, by, bw, 3);
      ctx.fillStyle = '#ff5a5a';
      ctx.fillRect(this.x - h, by, bw * this.hp / this.maxHp, 3);
    }
  }
}

// ---- Swarmer: tiny fast blue triangle. Moves as a swarm, mobs chompers
//      for 1 damage a hit (and feeds on them), but cells eat swarmers. ----
class Swarmer {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.maxHunger = opts.maxHunger ?? rand(28, 46);
    this.fullness = opts.fullness ?? this.maxHunger * 0.6;
    this.sight = opts.sight ?? rand(240, 420);
    this.speed = opts.speed ?? rand(3.2, 4.6);     // fastest by far — outruns cells
    this.reproAge = opts.reproAge ?? rand(4, 7) * SEC;   // breeds fast
    this.age = 0;
    this.dir = rand(0, Math.PI * 2);
    this.dead = false;
    this.splitFlash = 0;
    this.attackCd = 0;
  }

  get pct() { return this.fullness / this.maxHunger; }
  get size() { return 3 + this.pct * 2; }          // very small

  update(chompers, sim) {
    this.age += sim.dt;
    const metabolism = 0.03 + this.speed * 0.004;
    this.fullness -= metabolism * sim.dt;
    if (this.fullness <= 0) { this.dead = true; return; }
    if (this.attackCd > 0) this.attackCd -= sim.dt;

    // find nearest chomper to mob
    let target = null;
    let best = this.sight * this.sight;
    for (const ch of chompers) {
      if (ch.dead) continue;
      const d2 = dist2(this.x, this.y, ch.x, ch.y);
      if (d2 < best) { best = d2; target = ch; }
    }

    if (target) {
      this.dir = Math.atan2(target.y - this.y, target.x - this.x);
      const reach = target.size / 2 + this.size + 2;
      if (dist2(this.x, this.y, target.x, target.y) < reach * reach && this.attackCd <= 0) {
        target.hp -= 1;                            // 1 damage per bite
        this.attackCd = 18;                        // ~0.3s between bites
        this.fullness = Math.min(this.maxHunger, this.fullness + this.maxHunger * 0.4);
        if (target.hp <= 0) { target.dead = true; sim.chompKills++; }
      }
    } else {
      // no prey in sight: stick with the swarm (drift to its centre), else wander
      const cdx = sim.swarmCx - this.x, cdy = sim.swarmCy - this.y;
      if (cdx * cdx + cdy * cdy > 90 * 90) this.dir = Math.atan2(cdy, cdx) + rand(-0.3, 0.3);
      else this.dir += rand(-0.5, 0.5);
    }

    this.x += Math.cos(this.dir) * this.speed * sim.dt;
    this.y += Math.sin(this.dir) * this.speed * sim.dt;

    if (this.x < 0) { this.x = 0; this.dir = Math.PI - this.dir; }
    if (this.x > W) { this.x = W; this.dir = Math.PI - this.dir; }
    if (this.y < 0) { this.y = 0; this.dir = -this.dir; }
    if (this.y > H) { this.y = H; this.dir = -this.dir; }

    if (this.splitFlash > 0) this.splitFlash -= sim.dt;

    // they breed quickly — duplicate after a short lifespan if not starving
    if (this.age >= this.reproAge && this.pct > 0.4) {
      this.age = 0;
      this.fullness *= 0.5;
      this.splitFlash = 8;
      const m = () => Math.random() < 0.25 ? rand(0.9, 1.1) : 1;
      const child = new Swarmer(this.x + rand(-5, 5), this.y + rand(-5, 5), {
        maxHunger: this.maxHunger * m(),
        fullness: this.fullness,
        sight: Math.max(80, this.sight * m()),
        speed: Math.max(0.6, this.speed * m()),
        reproAge: Math.max(2 * SEC, this.reproAge * m()),
      });
      child.splitFlash = 8;
      sim.swarmBirths++;
      return child;
    }
    return null;
  }

  draw() {
    const s = this.size * 1.9;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.dir);
    ctx.fillStyle = this.splitFlash > 0 ? '#9ad4ff' : '#3a9bff';
    ctx.beginPath();
    ctx.moveTo(s, 0);
    ctx.lineTo(-s * 0.7, s * 0.7);
    ctx.lineTo(-s * 0.7, -s * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ---- Simulation state ----
const sim = {
  cells: [], plants: [], chompers: [], swarmers: [],
  births: 0, deaths: 0,
  chompBirths: 0, eaten: 0,
  swarmBirths: 0, chompKills: 0,
  swarmCx: WORLD_W / 2, swarmCy: WORLD_H / 2,    // swarm centre, recomputed each tick
  paused: false,
  dt: 1,
  speedMul: 1,
};

function spawnCell(x, y) {
  sim.cells.push(new Cell(x ?? rand(0, W), y ?? rand(0, H)));
}
function spawnPlant(x, y) {
  sim.plants.push(new Plant(x ?? rand(0, W), y ?? rand(0, H)));
}
function spawnChomper(x, y) {
  sim.chompers.push(new Chomper(x ?? rand(0, W), y ?? rand(0, H)));
}
function spawnSwarmer(x, y) {
  sim.swarmers.push(new Swarmer(x ?? rand(0, W), y ?? rand(0, H)));
}
function reset() {
  sim.cells = []; sim.plants = []; sim.chompers = []; sim.swarmers = [];
  sim.births = 0; sim.deaths = 0; sim.chompBirths = 0; sim.eaten = 0;
  sim.swarmBirths = 0; sim.chompKills = 0;
  for (let i = 0; i < 20; i++) spawnCell();
  for (let i = 0; i < 220; i++) spawnPlant();   // dense starting food for the big map
  for (let i = 0; i < 2; i++) spawnChomper();   // a couple predators to keep cells in check
  for (let i = 0; i < 14; i++) spawnSwarmer();  // a starting swarm
}
reset();

// ---- main loop ----
function step() {
  sim.dt = sim.speedMul;

  // update plants: grow seeds, and let mature plants drop new seeds
  const seeds = [];
  for (const p of sim.plants) {
    const seed = p.update(sim);
    if (seed) seeds.push(seed);
  }
  sim.plants.push(...seeds);

  // swarm centre (for swarmers' flocking), from current positions
  if (sim.swarmers.length) {
    let sx = 0, sy = 0;
    for (const s of sim.swarmers) { sx += s.x; sy += s.y; }
    sim.swarmCx = sx / sim.swarmers.length;
    sim.swarmCy = sy / sim.swarmers.length;
  }

  // update cells — they eat plants and swarmers (collect newborns)
  const newborns = [];
  for (const c of sim.cells) {
    const baby = c.update(sim.plants, sim.swarmers, sim);
    if (baby) newborns.push(baby);
  }

  // update chompers — they may mark cells as eaten/dead this tick
  const chompBabies = [];
  for (const ch of sim.chompers) {
    const baby = ch.update(sim.cells, sim);
    if (baby) chompBabies.push(baby);
  }

  // update swarmers — they mob chompers (damage/kill) and may breed
  const swarmBabies = [];
  for (const s of sim.swarmers) {
    const baby = s.update(sim.chompers, sim);
    if (baby) swarmBabies.push(baby);
  }

  // count cell deaths (starved + eaten) and remove
  const before = sim.cells.length;
  sim.cells = sim.cells.filter(c => !c.dead);
  sim.deaths += before - sim.cells.length;
  sim.cells.push(...newborns);

  // remove dead swarmers (starved or eaten by cells), add newborns
  sim.swarmers = sim.swarmers.filter(s => !s.dead);
  sim.swarmers.push(...swarmBabies);

  // a dying chomper fertilizes the ground: 4 plant seeds burst out
  for (const ch of sim.chompers) {
    if (!ch.dead) continue;
    for (let i = 0; i < 4; i++) {
      const ang = rand(0, Math.PI * 2), d = rand(15, 45);
      const sx = Math.min(W, Math.max(0, ch.x + Math.cos(ang) * d));
      const sy = Math.min(H, Math.max(0, ch.y + Math.sin(ang) * d));
      sim.plants.push(new Plant(sx, sy, false));
    }
  }
  // remove starved chompers, add newborns
  sim.chompers = sim.chompers.filter(ch => !ch.dead);
  sim.chompers.push(...chompBabies);

  // cap populations so things stay smooth
  if (sim.cells.length > 600) sim.cells.length = 600;
  if (sim.chompers.length > 200) sim.chompers.length = 200;
  if (sim.swarmers.length > 700) sim.swarmers.length = 700;

  sim.plants = sim.plants.filter(p => !p.dead);
  if (sim.plants.length > 1600) sim.plants.length = 1600;

  // ---- recovery floors so nothing goes permanently extinct ----
  // plants are the base of the food chain: keep a minimum spread around
  if (sim.plants.length < 40) spawnPlant();
  // if cells crash to near-zero, a few drift in so the colony can recover
  if (sim.cells.length < 5 && Math.random() < 0.04 * sim.dt) spawnCell();
  // predators only reappear once there's prey to support them
  if (sim.chompers.length === 0 && sim.cells.length > 30 && Math.random() < 0.02 * sim.dt) spawnChomper();
  // a swarm drifts back in once there are chompers to feed on
  if (sim.swarmers.length === 0 && sim.chompers.length > 2 && Math.random() < 0.03 * sim.dt) spawnSwarmer();

  // give everyone personal space so they stop stacking on each other
  separate(sim.cells, c => c.radius);
  separate(sim.chompers, ch => ch.size / 2);
  separate(sim.swarmers, s => s.size);
}

function render() {
  // reset to screen space and clear the whole canvas
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  ctx.clearRect(0, 0, view.sw, view.sh);

  // camera: scale the big world down to fit the screen, centered
  ctx.setTransform(view.dpr * view.scale, 0, 0, view.dpr * view.scale,
                   view.dpr * view.offX, view.dpr * view.offY);

  // world border
  ctx.strokeStyle = 'rgba(95,224,138,0.25)';
  ctx.lineWidth = 2 / view.scale;
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);

  for (const p of sim.plants) p.draw();
  for (const c of sim.cells) c.draw();
  for (const ch of sim.chompers) ch.draw();
  for (const s of sim.swarmers) s.draw();
}

function frame() {
  if (!sim.paused) step();
  render();

  document.getElementById('s-cells').textContent = sim.cells.length;
  document.getElementById('s-plants').textContent = sim.plants.length;
  document.getElementById('s-chompers').textContent = sim.chompers.length;
  document.getElementById('s-swarmers').textContent = sim.swarmers.length;
  document.getElementById('s-births').textContent = sim.births;
  document.getElementById('s-deaths').textContent = sim.deaths;
  document.getElementById('s-eaten').textContent = sim.eaten;
  document.getElementById('s-chompkills').textContent = sim.chompKills;

  // population bar graph — bars scaled to the biggest population
  const pops = [
    { key: 'plants',   name: 'Plants',   n: sim.plants.length },
    { key: 'cells',    name: 'Cells',    n: sim.cells.length },
    { key: 'chompers', name: 'Chompers', n: sim.chompers.length },
    { key: 'swarmers', name: 'Swarmers', n: sim.swarmers.length },
  ];
  const max = Math.max(1, ...pops.map(p => p.n));
  let lead = pops[0];
  for (const p of pops) {
    document.getElementById('bar-' + p.key).style.width = (p.n / max * 100) + '%';
    if (p.n > lead.n) lead = p;
  }
  document.getElementById('dominant').textContent = lead.n > 0 ? lead.name : 'nobody';

  // average cell stats — shown while paused
  const box = document.getElementById('paused-stats');
  if (sim.paused) {
    box.style.display = 'block';
    const n = sim.cells.length || 1;
    let h = 0, si = 0, sp = 0, mh = 0;
    for (const c of sim.cells) { h += c.pct; si += c.sight; sp += c.speed; mh += c.maxHunger; }
    document.getElementById('s-hunger').textContent = Math.round(h / n * 100) + '%';
    document.getElementById('s-sight').textContent = Math.round(si / n);
    document.getElementById('s-speed').textContent = (sp / n).toFixed(2);
    document.getElementById('s-maxh').textContent = Math.round(mh / n);

    const pn = sim.plants.length || 1;
    let pr = 0, ps = 0, pg = 0, psc = 0;
    for (const p of sim.plants) { pr += p.radius; ps += p.strength; pg += p.growthTime; psc += p.seedChance; }
    document.getElementById('s-pr').textContent = (pr / pn).toFixed(2);
    document.getElementById('s-ps').textContent = Math.round(ps / pn);
    document.getElementById('s-pg').textContent = (pg / pn).toFixed(1) + 's';
    document.getElementById('s-psc').textContent = Math.round(psc / pn * 100) + '%';
  } else {
    box.style.display = 'none';
  }

  requestAnimationFrame(frame);
}
frame();

// ---- controls ----
const pauseBtn = document.getElementById('btn-pause');
function togglePause() {
  sim.paused = !sim.paused;
  pauseBtn.textContent = sim.paused ? '▶ Play' : '⏸ Pause';
}
document.getElementById('btn-cell').onclick = () => spawnCell();
document.getElementById('btn-plant').onclick = () => { for (let i = 0; i < 10; i++) spawnPlant(); };
document.getElementById('btn-chomper').onclick = () => spawnChomper();
document.getElementById('btn-swarmer').onclick = () => { for (let i = 0; i < 8; i++) spawnSwarmer(); };
document.getElementById('btn-reset').onclick = reset;
pauseBtn.onclick = togglePause;
document.getElementById('sim-speed').oninput = e => sim.speedMul = e.target.value / 10;

// spacebar toggles pause (and reveals the average-stats panel)
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
});

// click to drop food, shift-click to drop a cell (screen -> world coords)
canvas.addEventListener('mousedown', e => {
  const p = toWorld(e.clientX, e.clientY);
  if (p.x < 0 || p.y < 0 || p.x > WORLD_W || p.y > WORLD_H) return;
  if (e.ctrlKey) spawnChomper(p.x, p.y);       // ctrl-click: predator
  else if (e.altKey) spawnSwarmer(p.x, p.y);   // alt-click: swarmer
  else if (e.shiftKey) spawnCell(p.x, p.y);    // shift-click: cell
  else spawnPlant(p.x, p.y);                   // click: food
});
</script>
