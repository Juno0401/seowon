<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOME RANDOM GAME</title>
<style>
  :root {
    --bg: #07070d;
    --card: #12121d;
    --accent: #7af;
    --text: #e8e8f4;
    --muted: #8a8aa0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(120,160,255,0.12), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(255,90,200,0.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ---- Hero ---- */
  header {
    text-align: center;
    padding: 90px 20px 50px;
    position: relative;
  }
  .badge {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 6px 16px;
    margin-bottom: 26px;
  }
  h1 {
    font-size: clamp(40px, 9vw, 96px);
    margin: 0;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.0;
    background: linear-gradient(100deg, #7af 0%, #b18cff 40%, #ff6bd0 75%, #ffd84a 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 6s linear infinite;
    filter: drop-shadow(0 4px 30px rgba(120,160,255,0.25));
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .subtitle {
    margin-top: 22px;
    color: var(--muted);
    font-size: 16px;
  }
  .subtitle b { color: var(--text); }
  .subtitle .vibe {
    color: #ff6bd0;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* ---- Games grid ---- */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 10px 22px 80px;
  }
  .section-title {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 6px 22px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
  }
  .card {
    background: linear-gradient(165deg, #16162400, var(--card));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: var(--cardaccent, #7af);
    box-shadow: 0 16px 40px rgba(0,0,0,0.45), 0 0 30px -8px var(--cardaccent, #7af);
  }
  .thumb {
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    position: relative;
    background:
      radial-gradient(circle at 50% 40%, var(--cardaccent, #7af) -40%, transparent 65%),
      #0c0c16;
  }
  .thumb::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 10px);
  }
  .card-body { padding: 18px 18px 20px; }
  .card-title { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
  .card-desc { font-size: 14px; color: var(--muted); line-height: 1.55; margin: 0 0 14px; }
  .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    font-size: 11px; letter-spacing: 1px;
    color: var(--cardaccent, #7af);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px; padding: 3px 10px;
  }
  .play {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 800; font-size: 14px;
    color: #0a0a12;
    background: var(--cardaccent, #7af);
    border-radius: 10px;
    padding: 10px 16px;
    align-self: flex-start;
  }

  /* coming soon */
  .card.soon {
    border-style: dashed;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    color: var(--muted);
    text-align: center;
    cursor: default;
  }
  .card.soon:hover { transform: none; box-shadow: none; border-color: rgba(255,255,255,0.14); }
  .card.soon .big { font-size: 44px; margin-bottom: 12px; opacity: .6; }

  footer {
    text-align: center;
    padding: 30px 20px 60px;
    color: var(--muted);
    font-size: 13px;
  }
  footer .heart { color: #ff6bd0; }
</style>
</head>
<body>
  <header>
    <span class="badge">Game Collection</span>
    <h1>SOME RANDOM GAME</h1>
    <p class="subtitle">
      made by <b>SEOWON</b> &nbsp;·&nbsp; built with <span class="vibe">VIBE CODING</span>
    </p>
  </header>

  <main>
    <div class="section-title">▸ Play now</div>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    © <span id="year"></span> SEOWON · made with <span class="heart">♥</span> &amp; vibe coding
  </footer>

<script>
  // ====== 게임 목록 ======
  // 새 게임을 추가하려면 아래 배열에 항목 하나만 넣으면 됩니다.
  // file: 게임 HTML 파일 이름 (이 폴더에 같이 두기)
  const GAMES = [
    {
      title: "Virus Hunter",
      desc: "마우스 커서가 되어 노란 구체를 쏘며, 끝없이 몰려오는 바이러스와 거대한 보스들을 물리치는 로그라이크 슈터.",
      file: "virus-hunter.html",
      icon: "🦠",
      color: "#ffd84a",
      tags: ["슈터", "로그라이크", "보스전"]
    },
    // 다음 게임은 여기에 추가됩니다 ↓
  ];

  const grid = document.getElementById('grid');
  for (const g of GAMES) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = g.file;
    a.style.setProperty('--cardaccent', g.color);
    a.innerHTML = `
      <div class="thumb">${g.icon}</div>
      <div class="card-body">
        <h3 class="card-title">${g.title}</h3>
        <p class="card-desc">${g.desc}</p>
        <div class="tags">${g.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <span class="play">▶ PLAY</span>
      </div>`;
    grid.appendChild(a);
  }

  // 항상 마지막에 "곧 추가" 카드
  const soon = document.createElement('div');
  soon.className = 'card soon';
  soon.innerHTML = `<div><div class="big">✦</div>새로운 게임이<br>곧 추가됩니다</div>`;
  grid.appendChild(soon);

  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
